<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White circle background -->
  <circle cx="32" cy="32" r="30" fill="white" stroke="#166534" stroke-width="4"/>
  <!-- Hour markers -->
  <line x1="32" y1="6" x2="32" y2="12" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="32" x2="52" y2="32" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="58" x2="32" y2="52" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="12" y2="32" stroke="#166534" stroke-width="3" stroke-linecap="round"/>
  <!-- Hour hand (pointing to ~10) -->
  <line x1="32" y1="32" x2="22" y2="16" stroke="#166534" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~2) -->
  <line x1="32" y1="32" x2="44" y2="14" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#166534"/>
</svg>
