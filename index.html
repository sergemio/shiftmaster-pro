<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftMaster Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .calendar-grid {
            background-size: 100% 50px;
            background-image: linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Directional Entrance Animations */
        @keyframes slideInForward {
            0% { opacity: 0; transform: translateX(40px) scale(0.98); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes slideInBackward {
            0% { opacity: 0; transform: translateX(-40px) scale(0.98); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes simpleFade {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-shift-forward {
            animation: slideInForward 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .animate-shift-backward {
            animation: slideInBackward 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .animate-shift-fade {
            animation: simpleFade 0.5s ease-out forwards;
            opacity: 0;
        }

        /* Stagger Classes (Extended to 30 for busier weeks) */
        .stagger-1 { animation-delay: 0.03s; }
        .stagger-2 { animation-delay: 0.06s; }
        .stagger-3 { animation-delay: 0.09s; }
        .stagger-4 { animation-delay: 0.12s; }
        .stagger-5 { animation-delay: 0.15s; }
        .stagger-6 { animation-delay: 0.18s; }
        .stagger-7 { animation-delay: 0.21s; }
        .stagger-8 { animation-delay: 0.24s; }
        .stagger-9 { animation-delay: 0.27s; }
        .stagger-10 { animation-delay: 0.30s; }
        .stagger-11 { animation-delay: 0.33s; }
        .stagger-12 { animation-delay: 0.36s; }
        .stagger-13 { animation-delay: 0.39s; }
        .stagger-14 { animation-delay: 0.42s; }
        .stagger-15 { animation-delay: 0.45s; }
        .stagger-16 { animation-delay: 0.48s; }
        .stagger-17 { animation-delay: 0.51s; }
        .stagger-18 { animation-delay: 0.54s; }
        .stagger-19 { animation-delay: 0.57s; }
        .stagger-20 { animation-delay: 0.60s; }
        .stagger-21 { animation-delay: 0.63s; }
        .stagger-22 { animation-delay: 0.66s; }
        .stagger-23 { animation-delay: 0.69s; }
        .stagger-24 { animation-delay: 0.72s; }
        .stagger-25 { animation-delay: 0.75s; }
        .stagger-26 { animation-delay: 0.78s; }
        .stagger-27 { animation-delay: 0.81s; }
        .stagger-28 { animation-delay: 0.84s; }
        .stagger-29 { animation-delay: 0.87s; }
        .stagger-30 { animation-delay: 0.90s; }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .animate-shimmer {
            animation: shimmer 2s infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
</body>
</html>
